<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffb6d9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Luna</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --hot:    #ff5fa0;
    --pink:   #ffb6d9;
    --soft:   #ffd6eb;
    --pale:   #fff0f8;
    --deep:   #d63c80;
    --yellow: #ffe066;
    --white:  #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }

  body {
    min-height: 100dvh;
    font-family: 'Nunito', sans-serif;
    background: var(--soft);
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
  }

  /* ---- BG gradient ---- */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 90% 60% at 50% 0%,  #ffe4f2 0%, transparent 65%),
      radial-gradient(ellipse 70% 50% at 0% 100%,  #ffcce8 0%, transparent 55%),
      radial-gradient(ellipse 60% 40% at 100% 50%, #ffc6e4 0%, transparent 55%),
      linear-gradient(160deg, #ffd6eb 0%, #ffb6d9 50%, #ffc8e4 100%);
  }

  /* ---- FLOATING FOOD DOODLES ---- */
  .foods {
    position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden;
  }
  .food {
    position: absolute;
    animation: food-float ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(200,60,120,0.18));
  }
  @keyframes food-float {
    0%,100% { transform: translateY(0px) rotate(var(--r0)); }
    50%      { transform: translateY(-14px) rotate(var(--r1)); }
  }

  /* ---- SPARKLES ---- */
  .sparkles { position: fixed; inset: 0; z-index: 3; pointer-events: none; }
  .sp {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, #ffcce8 50%, transparent 75%);
    animation: sp-twinkle ease-in-out infinite;
  }
  @keyframes sp-twinkle {
    0%,100% { opacity:0; transform:scale(0.4); }
    50%      { opacity:1; transform:scale(1.3); }
  }

  /* ---- CONTENT ---- */
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100dvh;
    padding: 2.5rem 1.5rem;
    padding-top: max(2.5rem, env(safe-area-inset-top));
    padding-bottom: max(2.5rem, env(safe-area-inset-bottom));
  }

  /* ---- AVATAR ---- */
  .avatar-wrap {
    position: relative; width: 115px; height: 115px; margin-bottom: 1.2rem;
  }
  .avatar-ring {
    position: absolute; inset: -6px; border-radius: 50%;
    background: conic-gradient(#ff5fa0,#ffb6d9,#ffe066,#ff9cc8,#ff5fa0,#ffcce8,#ff5fa0);
    animation: ring-spin 4s linear infinite;
  }
  @keyframes ring-spin { to { transform: rotate(360deg); } }
  .avatar-ring-inner {
    position: absolute; inset: 3px; border-radius: 50%;
    background: var(--soft); z-index: 1;
  }
  .avatar {
    position: absolute; inset: 5px; z-index: 2;
    width: calc(100% - 10px); height: calc(100% - 10px);
    border-radius: 50%; object-fit: cover; display: block;
  }
  /* Donut badge */
  .badge {
    position: absolute; bottom: -4px; right: -4px;
    width: 34px; height: 34px; z-index: 3;
    animation: badge-wiggle 2s ease-in-out infinite;
  }
  @keyframes badge-wiggle {
    0%,100% { transform: rotate(-10deg) scale(1); }
    50%      { transform: rotate(10deg) scale(1.15); }
  }

  /* ---- NAME ---- */
  h1 {
    font-family: 'Pacifico', cursive;
    font-size: 2.8rem;
    color: var(--deep);
    text-align: center;
    letter-spacing: 0.02em;
    margin-bottom: 0.15rem;
    text-shadow: 0 3px 0 rgba(255,100,160,0.25), 0 0 20px rgba(255,100,160,0.2);
  }

  .name-sub {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    color: var(--hot);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-bottom: 0.7rem;
    text-align: center;
  }

  /* Wavy divider */
  .divider { width: 100px; height: 8px; margin: 0 auto 0.9rem; }

  /* ---- LOCATION ---- */
  .location-text {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Nunito', sans-serif; font-weight: 600;
    font-size: 0.75rem; color: var(--deep);
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(8px);
    padding: 5px 14px; border-radius: 50px;
    border: 1.5px solid rgba(255,100,160,0.25);
    margin-bottom: 1.5rem;
    letter-spacing: 0.04em;
    box-shadow: 0 2px 10px rgba(255,100,160,0.1);
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #6dbf7e; flex-shrink: 0;
    box-shadow: 0 0 6px #6dbf7e;
    animation: dot-pulse 2s ease-in-out infinite;
  }
  @keyframes dot-pulse { 0%,100%{opacity:1;}50%{opacity:0.3;} }

  /* ---- BUTTONS ---- */
  .buttons {
    display: flex; flex-direction: column; gap: 0.65rem;
    width: 100%; max-width: 300px;
  }

  .btn {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    width: 100%; min-height: 52px; padding: 0 1.2rem;
    border-radius: 50px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: var(--deep);
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase;
    text-align: center; text-decoration: none;
    border: 2px solid rgba(255,100,160,0.3);
    cursor: pointer; touch-action: manipulation;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
    transition: transform 0.12s ease, background 0.15s ease;
    box-shadow: 0 4px 0 rgba(255,100,160,0.2), 0 6px 16px rgba(255,100,160,0.1);
  }

  .btn::after {
    content: '';
    position: absolute; top:0; left:-100%; width:60%; height:100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    transition: left 0.4s; pointer-events: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, #ff5fa0 0%, #e8387a 100%);
    border-color: #d42a6a;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.15);
    box-shadow: 0 4px 0 #b81e58, 0 6px 20px rgba(255,80,140,0.3);
    animation: btn-bounce 2.5s ease-in-out infinite;
  }
  @keyframes btn-bounce {
    0%,100% { transform: translateY(0); box-shadow: 0 4px 0 #b81e58, 0 6px 20px rgba(255,80,140,0.3); }
    50%      { transform: translateY(-3px); box-shadow: 0 7px 0 #b81e58, 0 10px 24px rgba(255,80,140,0.35); }
  }

  .btn-second { border-color: rgba(255,100,160,0.35); }

  @media (hover:hover) {
    .btn:hover { background: rgba(255,255,255,0.92); transform: translateY(-2px); }
    .btn:hover::after { left: 140%; }
    .btn-primary:hover { background: linear-gradient(135deg, #ff79b4 0%, #f04a8a 100%); }
  }
  .btn:active { transform: scale(0.97) translateY(2px); }

  /* ---- BTN TAG ---- */
  .btn-tag-wrap { position: relative; }
  .btn-tag {
    position: absolute; left: calc(100% + 10px); top: 50%;
    transform: translateY(-50%) rotate(-8deg);
    display: flex; align-items: center; gap: 4px;
    font-size: 0.82rem; color: var(--deep);
    pointer-events: none; white-space: nowrap;
    animation: tag-bounce 1.6s ease-in-out infinite;
    font-family: 'Nunito', sans-serif; font-weight: 700;
  }
  .btn-tag svg { width: 24px; height: 18px; transform: scaleX(-1); }
  @keyframes tag-bounce {
    0%,100% { transform: translateY(-50%) rotate(-8deg) scale(1); }
    50%      { transform: translateY(-50%) rotate(-8deg) scale(1.1); }
  }

  /* ---- FOOTER ---- */
  .footer-deco {
    margin-top: 1.6rem;
    font-family: 'Pacifico', cursive;
    font-size: 0.72rem;
    color: rgba(214,60,128,0.45);
    letter-spacing: 0.05em;
    text-align: center;
  }
</style>
</head>

<script>
(function() {
  var fallbacks = [
    "Stockholm","Göteborg","Malmö","Uppsala","Linköping","Örebro","Västerås",
    "Helsingborg","Norrköping","Jönköping","Umeå","Lund","Gävle","Borås","Sundsvall",
    "Oslo","Bergen","Trondheim","Stavanger","Drammen","Kristiansand","Tromsø","Ålesund"
  ];
  function setCity(city) {
    var c = (city && city.trim().length > 1) ? city.trim() : fallbacks[Math.floor(Math.random() * fallbacks.length)];
    document.getElementById('loc-text').textContent = '5 minutes ago in: ' + c;
  }
  function get(url, extract) {
    return fetch(url,{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
      var v=extract(d); if(!v||v.trim().length<2) throw new Error('no city'); return v;
    });
  }
  get('https://ipinfo.io/json',function(d){return d&&d.city;})
    .catch(function(){return get('https://ip-api.com/json/?fields=city,regionName',function(d){return d&&(d.city||d.regionName);});})
    .catch(function(){return get('https://ipapi.co/json/',function(d){return d&&(d.city||d.region);});})
    .then(function(city){setCity(city);})
    .catch(function(){setCity(null);});
})();
</script>
